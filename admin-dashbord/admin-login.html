<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - KMERSCHOOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .gradient-admin {
            background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%);
        }
    </style>
</head>

<body class="bg-gray-100">

    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full">

            <!-- Header -->
            <div class="text-center mb-8">
                <div class="flex justify-center mb-6">
                    <img src="../assets/logo/LOGO.png" alt="KMERSCHOOL" class="h-36 w-auto object-contain">
                </div>
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Espace Administrateur</h1>
                <p class="text-gray-600">Accès réservé aux administrateurs KMERSCHOOL</p>
            </div>

            <!-- Carte de login -->
            <div class="bg-white rounded-2xl shadow-xl p-8 border-t-4 border-blue-600">

                <!-- Message -->
                <div id="message" class="hidden mb-4 p-4 rounded-lg"></div>

                <!-- Formulaire -->
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Email administrateur
                        </label>
                        <input type="email" id="email" required
                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none transition"
                            placeholder="admin@kmerschool.com">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Mot de passe
                        </label>
                        <input type="password" id="password" required
                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none transition"
                            placeholder="••••••••">
                    </div>

                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center">
                            <input type="checkbox" class="w-4 h-4 text-blue-600 border-gray-300 rounded">
                            <span class="ml-2 text-gray-600">Se souvenir de moi</span>
                        </label>
                        <a href="#" class="text-blue-600 hover:text-blue-700 font-semibold">
                            Mot de passe oublié ?
                        </a>
                    </div>

                    <button type="submit"
                        class="w-full py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold rounded-lg hover:shadow-lg transition-all">
                        Se connecter
                    </button>
                </form>

                <!-- Warning -->
                <div class="mt-6 p-4 bg-amber-50 border border-amber-200 rounded-lg">
                    <div class="flex items-start">
                        <svg class="w-5 h-5 text-amber-600 mt-0.5 mr-3 flex-shrink-0" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                            </path>
                        </svg>
                        <div>
                            <p class="text-sm font-semibold text-amber-800">Accès sécurisé</p>
                            <p class="text-xs text-amber-700 mt-1">Toutes les connexions admin sont enregistrées et
                                surveillées.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Retour -->
            <div class="text-center mt-6">
                <a href="../index.html" class="text-gray-600 hover:text-gray-900 font-medium">
                    ← Retour au site
                </a>
            </div>
        </div>
    </div>

    <!-- Modules Config -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        const messageDiv = document.getElementById('message')

        // ==========================================
        // UTILITAIRES
        // ==========================================
        function showMessage(message, isError = false) {
            messageDiv.textContent = message
            messageDiv.className = `mb-4 p-4 rounded-lg ${isError ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-green-100 text-green-700 border border-green-200'}`
            messageDiv.classList.remove('hidden')
            setTimeout(() => messageDiv.classList.add('hidden'), 5000)
        }

        // ==========================================
        // VÉRIFICATION SESSION EXISTANTE
        // ==========================================
        async function checkExistingSession() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser()

                if (user) {
                    console.log('🔐 Utilisateur déjà connecté, vérification admin...')
                    const admin = await AdminAuth.verifyAdminStatus(user.id)

                    if (admin && admin.est_actif) {
                        console.log('✅ Admin déjà identifié, redirection...')
                        window.location.href = 'index-admin.html'
                    }
                }
            } catch (error) {
                console.error('Erreur session:', error)
            }
        }

        // ==========================================
        // GESTION DU LOGIN
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault()

            const email = document.getElementById('email').value.trim()
            const password = document.getElementById('password').value

            const btn = e.target.querySelector('button[type="submit"]')
            const originalText = btn.textContent

            btn.disabled = true
            btn.textContent = 'Vérification...'

            try {
                await AdminAuth.login(email, password)

                showMessage('Connexion réussie ! Redirection...')
                setTimeout(() => {
                    window.location.href = 'index-admin.html'
                }, 1000)

            } catch (error) {
                console.error('❌ Erreur login:', error)
                showMessage(error.message || 'Erreur de connexion', true)
                btn.disabled = false
                btn.textContent = originalText
            }
        })

        // Initialisation
        checkExistingSession()
    </script>
</body>

</html>
```
